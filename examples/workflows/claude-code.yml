name: Claude Code

on:
  issue_comment:
    types: [created]

jobs:
  # @claude plan on issues — generate PRD, push branch, create draft PR
  plan:
    if: |
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude plan')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Acknowledge comment
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing draft PRs
        id: check
        run: |
          ISSUE=${{ github.event.issue.number }}
          LINKED_PRS=$(gh pr list --search "issue:$ISSUE" --json number,state,url,isDraft --jq '.[] | "#\(.number) (\(.state), draft=\(.isDraft)) \(.url)"' 2>/dev/null || true)

          if [ -n "$LINKED_PRS" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            gh issue comment "$ISSUE" --body "Already has linked PRs:
          $LINKED_PRS

          Use \`@claude revise\` on the PR to update the PRD, or close the PR to start fresh."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve requestor
        if: steps.check.outputs.found == 'false'
        id: requestor
        run: |
          NAME=$(gh api "users/${{ github.actor }}" --jq '.name // .login' 2>/dev/null || echo "${{ github.actor }}")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code
        if: steps.check.outputs.found == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/kuuuurt/prdx.git"
          plugins: "prdx@prdx"
          claude_args: "--allowedTools Bash,Read,Write,Edit,Glob,Grep,Agent,Skill,TodoWrite,TodoRead"
          prompt: |
            Generate a PRD for issue #${{ github.event.issue.number }} using:
            /prdx:prdx --ci --issue ${{ github.event.issue.number }} --plan-only --requested-by ${{ github.actor }}

            IMPORTANT: Do NOT create a pull request. Do NOT comment on the issue. Do NOT run `gh pr create` or `gh issue comment`. Just generate the PRD, commit it, and push the branch. The CI workflow handles PR creation.
        env:
          GIT_AUTHOR_NAME: ${{ steps.requestor.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com

      - name: Create draft PR
        if: steps.check.outputs.found == 'false'
        run: |
          ISSUE=${{ github.event.issue.number }}

          # Find the PRD file
          PRD_FILE=$(ls .prdx/plans/prdx-*.md 2>/dev/null | head -1)
          if [ -z "$PRD_FILE" ]; then
            echo "::error::No PRD file found after planning"
            exit 1
          fi

          # Extract title from PRD (first H1)
          TITLE=$(head -1 "$PRD_FILE" | sed 's/^# //')

          # Extract type and map to conventional prefix
          TYPE=$(grep '^\*\*Type:\*\*' "$PRD_FILE" | sed 's/\*\*Type:\*\* //')
          case "$TYPE" in
            feature) PREFIX="feat" ;;
            bug-fix) PREFIX="fix" ;;
            refactor) PREFIX="refactor" ;;
            spike) PREFIX="chore" ;;
            *) PREFIX="feat" ;;
          esac

          # Extract sections from PRD
          extract_section() {
            awk -v section="$1" '
              $0 ~ "^## " section { found=1; next }
              /^## / { found=0 }
              found { print }
            ' "$2"
          }

          GOAL=$(extract_section "Goal" "$PRD_FILE")
          PROBLEM=$(extract_section "Problem" "$PRD_FILE")
          AC=$(extract_section "Acceptance Criteria" "$PRD_FILE")
          APPROACH=$(extract_section "Approach" "$PRD_FILE")

          DEFAULT_BRANCH=$(git symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's@^refs/remotes/origin/@@' || echo 'main')

          gh pr create --draft \
            --title "${PREFIX}: ${TITLE}" \
            --base "$DEFAULT_BRANCH" \
            --body "## Summary
          ${GOAL}

          ## Problem
          ${PROBLEM}

          ## Acceptance Criteria
          ${AC}

          ## Approach
          ${APPROACH}

          ---
          **PRD:** \`${PRD_FILE}\`
          Comment \`@claude implement\` when ready, or \`@claude revise\` with feedback.

          Closes #${ISSUE}"

          PR_NUMBER=$(gh pr view --json number --jq '.number')
          gh issue comment "$ISSUE" --body "PRD created in draft PR #${PR_NUMBER}. Review and comment \`@claude implement\` when ready."
        env:
          GH_TOKEN: ${{ github.token }}

  # @claude revise on PRs — update PRD based on feedback
  revise:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude revise')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Acknowledge comment
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch
        id: pr
        run: |
          PR_BRANCH=$(gh pr view ${{ github.event.issue.number }} --json headRefName --jq '.headRefName')
          echo "branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve requestor
        id: requestor
        run: |
          NAME=$(gh api "users/${{ github.actor }}" --jq '.name // .login' 2>/dev/null || echo "${{ github.actor }}")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/kuuuurt/prdx.git"
          plugins: "prdx@prdx"
          claude_args: "--allowedTools Bash,Read,Write,Edit,Glob,Grep,Agent,Skill,TodoWrite,TodoRead"
          prompt: |
            You are on a draft PR branch that contains a PRDX PRD file.

            Find the PRD file in .prdx/plans/prdx-*.md and revise it based on this feedback:

            ${{ github.event.comment.body }}

            Also check for any PR review comments:
            gh pr view ${{ github.event.issue.number }} --json reviews,comments

            After revising:
            1. Update the PRD file
            2. Commit with message "docs: revise PRD based on feedback"
            3. Push the changes

            IMPORTANT: Do NOT update the PR title or description. Do NOT comment on the PR. The CI workflow handles that.
        env:
          GIT_AUTHOR_NAME: ${{ steps.requestor.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com

      - name: Update PR description
        run: |
          git pull origin ${{ steps.pr.outputs.branch }} || true

          PRD_FILE=$(ls .prdx/plans/prdx-*.md 2>/dev/null | head -1)
          if [ -z "$PRD_FILE" ]; then exit 0; fi

          extract_section() {
            awk -v section="$1" '
              $0 ~ "^## " section { found=1; next }
              /^## / { found=0 }
              found { print }
            ' "$2"
          }

          GOAL=$(extract_section "Goal" "$PRD_FILE")
          PROBLEM=$(extract_section "Problem" "$PRD_FILE")
          AC=$(extract_section "Acceptance Criteria" "$PRD_FILE")
          APPROACH=$(extract_section "Approach" "$PRD_FILE")

          # Preserve Closes line from existing body
          ISSUE_NUM=$(gh pr view ${{ github.event.issue.number }} --json body --jq '.body' | grep -oP 'Closes #\K\d+' || echo "")
          CLOSES_LINE=""
          if [ -n "$ISSUE_NUM" ]; then
            CLOSES_LINE="Closes #${ISSUE_NUM}"
          fi

          gh pr edit ${{ github.event.issue.number }} --body "## Summary
          ${GOAL}

          ## Problem
          ${PROBLEM}

          ## Acceptance Criteria
          ${AC}

          ## Approach
          ${APPROACH}

          ---
          **PRD:** \`${PRD_FILE}\`
          Comment \`@claude implement\` when ready, or \`@claude revise\` with feedback.

          ${CLOSES_LINE}"
        env:
          GH_TOKEN: ${{ github.token }}

  # @claude implement on PRs — implement from PRD
  implement:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude implement')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Acknowledge comment
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch
        id: pr
        run: |
          PR_BRANCH=$(gh pr view ${{ github.event.issue.number }} --json headRefName --jq '.headRefName')
          echo "branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Find PRD slug
        id: prd
        run: |
          PRD_FILE=$(ls .prdx/plans/prdx-*.md 2>/dev/null | head -1)
          if [ -z "$PRD_FILE" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            gh pr comment ${{ github.event.issue.number }} --body "No PRD found on this branch. Run \`@claude plan\` on the linked issue first."
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            SLUG=$(basename "$PRD_FILE" .md | sed 's/^prdx-//')
            echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
            echo "file=$PRD_FILE" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve requestor
        if: steps.prd.outputs.found == 'true'
        id: requestor
        run: |
          NAME=$(gh api "users/${{ github.actor }}" --jq '.name // .login' 2>/dev/null || echo "${{ github.actor }}")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code
        if: steps.prd.outputs.found == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/kuuuurt/prdx.git"
          plugins: "prdx@prdx"
          claude_args: "--allowedTools Bash,Read,Write,Edit,Glob,Grep,Agent,Skill,TodoWrite,TodoRead"
          prompt: |
            Implement the PRD using:
            /prdx:implement ${{ steps.prd.outputs.slug }}

            After implementation is complete, push all changes to origin.

            IMPORTANT: Do NOT create or update pull requests. Do NOT mark the PR as ready. The CI workflow handles that.
        env:
          GIT_AUTHOR_NAME: ${{ steps.requestor.outputs.name }}
          GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com
          CI: "true"

      - name: Update PR description
        if: steps.prd.outputs.found == 'true'
        run: |
          git pull origin ${{ steps.pr.outputs.branch }} || true

          PRD_FILE="${{ steps.prd.outputs.file }}"

          extract_section() {
            awk -v section="$1" '
              $0 ~ "^## " section { found=1; next }
              /^## / { found=0 }
              found { print }
            ' "$2"
          }

          GOAL=$(extract_section "Goal" "$PRD_FILE")
          PROBLEM=$(extract_section "Problem" "$PRD_FILE")
          AC=$(extract_section "Acceptance Criteria" "$PRD_FILE")
          APPROACH=$(extract_section "Approach" "$PRD_FILE")
          IMPL_NOTES=$(extract_section "Implementation Notes" "$PRD_FILE")

          # Preserve Closes line from existing body
          ISSUE_NUM=$(gh pr view ${{ github.event.issue.number }} --json body --jq '.body' | grep -oP 'Closes #\K\d+' || echo "")
          CLOSES_LINE=""
          if [ -n "$ISSUE_NUM" ]; then
            CLOSES_LINE="Closes #${ISSUE_NUM}"
          fi

          IMPL_SECTION=""
          if [ -n "$IMPL_NOTES" ]; then
            IMPL_SECTION="## Implementation Notes
          ${IMPL_NOTES}"
          fi

          gh pr edit ${{ github.event.issue.number }} --body "## Summary
          ${GOAL}

          ## Problem
          ${PROBLEM}

          ## Acceptance Criteria
          ${AC}

          ## Approach
          ${APPROACH}

          ${IMPL_SECTION}

          ---
          **PRD:** \`${PRD_FILE}\`
          Comment \`@claude review\` for code review.

          ${CLOSES_LINE}"
        env:
          GH_TOKEN: ${{ github.token }}

  # @claude review on PRs — code review
  review:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Acknowledge comment
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "Bash(gh api:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(jq:*),Bash(echo:*),Bash(cat:*)" --system-prompt "When reviewing pull requests:

            REVIEW PROCESS:
            1. Read the COMPLETE diff first — every file, every hunk. Do NOT start writing comments until you have read ALL changes.
            2. Only after reading everything, compose your review.
            3. Surface ALL issues in a single review — never hold back findings for a follow-up. This is your ONE chance to flag everything.
            4. Before submitting, verify you have reviewed every changed file in the diff.

            WHAT TO FLAG (>90% confidence only):
            - Bugs and logic errors that will cause incorrect behavior
            - Security vulnerabilities
            - Architectural problems that will cause maintenance pain

            WHAT TO SKIP:
            - Style preferences, naming, minor nitpicks
            - Missing comments or documentation
            - Test coverage gaps unless a critical path is untested
            - Nice-to-haves that aren't wrong

            COMMENT STYLE:
            - 1-2 sentences max per comment. Be direct.
            - No code samples unless essential to explain the fix
            - Reference CLAUDE.md conventions by name, don't re-explain them

            SUBMISSION:
            Submit all feedback as a single batched PR review using the GitHub API. Do NOT use gh pr comment or mcp__github_inline_comment__create_inline_comment. Collect all inline comments (no summary body), then submit as ONE review: write a JSON object with event, body (empty string), and comments array to a temp file, then call gh api repos/{owner}/{repo}/pulls/{number}/reviews --method POST --input /tmp/review.json. The comments array items need path (relative file path), line (line number in the new file), and body (comment text)."
