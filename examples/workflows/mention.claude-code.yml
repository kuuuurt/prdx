name: Claude Code

on:
  issue_comment:
    types: [created]

jobs:
  # @claude plan on issues — generate PRD, create draft PR, comment on issue
  plan:
    if: |
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude plan')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Acknowledge comment
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing draft PRs
        id: check
        run: |
          ISSUE=${{ github.event.issue.number }}
          LINKED_PRS=$(gh pr list --search "issue:$ISSUE" --json number,state,url,isDraft --jq '.[] | "#\(.number) (\(.state), draft=\(.isDraft)) \(.url)"' 2>/dev/null || true)

          if [ -n "$LINKED_PRS" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            gh issue comment "$ISSUE" --body "Already has linked PRs:
          $LINKED_PRS

          Use \`@claude revise\` on the PR to update the PRD, or close the PR to start fresh."
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment progress
        if: steps.check.outputs.found == 'false'
        id: progress
        run: |
          COMMENT_URL=$(gh issue comment ${{ github.event.issue.number }} --body "![Planning](https://github.com/user-attachments/assets/5ac382c7-e004-429b-8e35-7feb3e8f9c6f) Planning in progress... [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" | grep -o 'https://[^ ]*')
          COMMENT_ID=$(echo "$COMMENT_URL" | grep -o '[0-9]*$')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code
        if: steps.check.outputs.found == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/kuuuurt/prdx.git"
          plugins: "prdx@prdx"
          claude_args: "--allowedTools Bash,Read,Write,Edit,Glob,Grep,Agent,Skill,TodoWrite,TodoRead"
          prompt: |
            Generate a PRD for issue #${{ github.event.issue.number }} using:
            /prdx:prdx --ci --issue ${{ github.event.issue.number }} --plan-only --requested-by ${{ github.actor }}
        env:
          GIT_AUTHOR_NAME: ${{ github.actor }}
          GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com

      - name: Comment done
        if: steps.check.outputs.found == 'false' && always()
        run: |
          if [ "${{ steps.progress.outputs.comment_id }}" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${{ steps.progress.outputs.comment_id }} -X PATCH -f body="Planning complete. A draft PR has been created — review the PRD and comment \`@claude implement\` when ready."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # @claude revise on PRs — update PRD based on feedback, update PR body
  revise:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude revise')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Acknowledge comment
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch
        run: |
          PR_BRANCH=$(gh pr view ${{ github.event.issue.number }} --json headRefName --jq '.headRefName')
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Extract linked issue
        id: issue
        run: |
          ISSUE_NUM=$(gh pr view ${{ github.event.issue.number }} --json body --jq '.body' | grep -oP 'Closes #\K\d+' || echo "")
          echo "number=$ISSUE_NUM" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment progress
        id: progress
        run: |
          COMMENT_URL=$(gh pr comment ${{ github.event.issue.number }} --body "![Revising](https://github.com/user-attachments/assets/5ac382c7-e004-429b-8e35-7feb3e8f9c6f) Revising PRD... [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" | grep -o 'https://[^ ]*')
          COMMENT_ID=$(echo "$COMMENT_URL" | grep -o '[0-9]*$')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/kuuuurt/prdx.git"
          plugins: "prdx@prdx"
          claude_args: "--allowedTools Bash,Read,Write,Edit,Glob,Grep,Agent,Skill,TodoWrite,TodoRead"
          prompt: |
            Revise the PRD based on PR feedback:
            /prdx:prdx --ci --issue ${{ steps.issue.outputs.number }} --plan-only --requested-by ${{ github.actor }}
        env:
          GIT_AUTHOR_NAME: ${{ github.actor }}
          GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com

      - name: Comment done
        if: always()
        run: |
          if [ "${{ steps.progress.outputs.comment_id }}" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${{ steps.progress.outputs.comment_id }} -X PATCH -f body="PRD revised. Review the updated PR description and comment \`@claude implement\` when ready."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # @claude implement on PRs — implement from PRD, update PR body
  implement:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude implement')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Acknowledge comment
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout PR branch
        run: |
          PR_BRANCH=$(gh pr view ${{ github.event.issue.number }} --json headRefName --jq '.headRefName')
          git fetch origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Find PRD slug
        id: prd
        run: |
          BRANCH=$(git branch --show-current)
          PRD_FILE=$(grep -rl "^\*\*Branch:\*\* $BRANCH" .prdx/plans/prdx-*.md 2>/dev/null | head -1)
          if [ -z "$PRD_FILE" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            gh pr comment ${{ github.event.issue.number }} --body "No PRD found matching branch \`$BRANCH\`. Run \`@claude plan\` on the linked issue first."
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            SLUG=$(basename "$PRD_FILE" .md | sed 's/^prdx-//')
            echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Comment progress
        if: steps.prd.outputs.found == 'true'
        id: progress
        run: |
          COMMENT_URL=$(gh pr comment ${{ github.event.issue.number }} --body "![Implementing](https://github.com/user-attachments/assets/5ac382c7-e004-429b-8e35-7feb3e8f9c6f) Implementing \`${{ steps.prd.outputs.slug }}\`... [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" | grep -o 'https://[^ ]*')
          COMMENT_ID=$(echo "$COMMENT_URL" | grep -o '[0-9]*$')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run Claude Code
        if: steps.prd.outputs.found == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/kuuuurt/prdx.git"
          plugins: "prdx@prdx"
          claude_args: "--allowedTools Bash,Read,Write,Edit,Glob,Grep,Agent,Skill,TodoWrite,TodoRead"
          prompt: |
            Implement the PRD:
            /prdx:implement ${{ steps.prd.outputs.slug }}
        env:
          GIT_AUTHOR_NAME: ${{ github.actor }}
          GIT_AUTHOR_EMAIL: ${{ github.actor }}@users.noreply.github.com
          CI: "true"

      - name: Comment done
        if: steps.prd.outputs.found == 'true' && always()
        run: |
          if [ "${{ steps.progress.outputs.comment_id }}" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${{ steps.progress.outputs.comment_id }} -X PATCH -f body="Implementation complete. Comment \`@claude review\` for code review, or review the changes yourself."
          fi
        env:
          GH_TOKEN: ${{ github.token }}

  # @claude review on PRs — code review
  review:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Acknowledge comment
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content=eyes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --allowedTools "Bash(gh api:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(jq:*),Bash(echo:*),Bash(cat:*)" --system-prompt "When reviewing pull requests:

            REVIEW PROCESS:
            1. Read the COMPLETE diff first — every file, every hunk. Do NOT start writing comments until you have read ALL changes.
            2. Only after reading everything, compose your review.
            3. Surface ALL issues in a single review — never hold back findings for a follow-up. This is your ONE chance to flag everything.
            4. Before submitting, verify you have reviewed every changed file in the diff.

            WHAT TO FLAG (>90% confidence only):
            - Bugs and logic errors that will cause incorrect behavior
            - Security vulnerabilities
            - Architectural problems that will cause maintenance pain

            WHAT TO SKIP:
            - Style preferences, naming, minor nitpicks
            - Missing comments or documentation
            - Test coverage gaps unless a critical path is untested
            - Nice-to-haves that aren't wrong

            COMMENT STYLE:
            - 1-2 sentences max per comment. Be direct.
            - No code samples unless essential to explain the fix
            - Reference CLAUDE.md conventions by name, don't re-explain them

            SUBMISSION:
            Submit all feedback as a single batched PR review using the GitHub API. Do NOT use gh pr comment or mcp__github_inline_comment__create_inline_comment. Collect all inline comments (no summary body), then submit as ONE review: write a JSON object with event, body (empty string), and comments array to a temp file, then call gh api repos/{owner}/{repo}/pulls/{number}/reviews --method POST --input /tmp/review.json. The comments array items need path (relative file path), line (line number in the new file), and body (comment text)."
